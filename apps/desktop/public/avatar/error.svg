<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" role="img" aria-label="Optimus Prime error avatar">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#210707"/>
    </radialGradient>
    <linearGradient id="blueMetal" x1="58" y1="34" x2="135" y2="128">
      <stop offset="0%" stop-color="#2f80ff"/>
      <stop offset="45%" stop-color="#1244b5"/>
      <stop offset="100%" stop-color="#08245c"/>
    </linearGradient>
    <linearGradient id="redMetal" x1="24" y1="130" x2="170" y2="188">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="48%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
    <linearGradient id="silver" x1="74" y1="84" x2="119" y2="145">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="52%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <clipPath id="roundClip">
      <circle cx="96" cy="96" r="91"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <circle cx="96" cy="96" r="94" fill="#ef4444" opacity=".85">
    <animate attributeName="opacity" values=".55;.95;.55" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <g clip-path="url(#roundClip)">
    <circle cx="96" cy="96" r="91" fill="url(#bg)"/>
    <circle cx="96" cy="99" r="78" fill="none" stroke="#ef4444" stroke-width="1.4" opacity=".28"/>
    <circle cx="96" cy="99" r="66" fill="none" stroke="#ef4444" stroke-width="1" opacity=".22"/>
    <path d="M15 38 C51 8 135 5 178 42 L178 0 L15 0 Z" fill="#fff" opacity=".08"/>

    
  <g opacity=".88">
    <circle cx="96" cy="96" r="72" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="9 8">
      <animateTransform attributeName="transform" type="rotate" from="0 96 96" to="360 96 96" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <path d="M34 46 H72 M118 46 H158 M23 81 H55 M137 81 H172 M35 126 H76 M116 126 H160" stroke="#ef4444" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values=".15;1;.15" dur=".7s" repeatCount="indefinite"/>
    </path>
  </g>

    <g filter="url(#shadow)">
      <!-- shoulders / truck armor -->
      <path d="M5 151 L54 133 L77 149 L96 145 L115 149 L138 133 L187 151 L192 192 H0 Z" fill="url(#redMetal)"/>
      <path d="M19 161 L72 146 L87 161 H105 L120 146 L173 161 L166 192 H26 Z" fill="#7f1d1d" opacity=".88"/>
      <path d="M34 160 L72 151 L82 168 H34 Z" fill="#0f2e65" opacity=".8"/>
      <path d="M158 160 L120 151 L110 168 H158 Z" fill="#0f2e65" opacity=".8"/>
      <path d="M73 150 H119 L126 181 H66 Z" fill="#374151" stroke="#9ca3af" stroke-width="1.5"/>
      <path d="M82 153 H110 L115 174 H77 Z" fill="#b91c1c"/>
      <rect x="90" y="151" width="12" height="10" rx="1.5" fill="#1e40af" stroke="#93c5fd" stroke-width="1"/>
      <rect x="45" y="165" width="17" height="4" rx="2" fill="#ef4444" filter="url(#glow)" opacity=".9"/>
      <rect x="130" y="165" width="17" height="4" rx="2" fill="#ef4444" filter="url(#glow)" opacity=".9"/>

      <!-- side antenna fins -->
      <path d="M45 17 L59 93 L43 116 L34 58 Z" fill="url(#blueMetal)" stroke="#60a5fa" stroke-width="1.2"/>
      <path d="M147 17 L133 93 L149 116 L158 58 Z" fill="url(#blueMetal)" stroke="#60a5fa" stroke-width="1.2"/>
      <path d="M50 26 L56 84" stroke="#93c5fd" stroke-width="1" opacity=".55"/>
      <path d="M142 26 L136 84" stroke="#93c5fd" stroke-width="1" opacity=".55"/>

      <!-- head helmet -->
      <path d="M57 80 C57 51 75 32 96 32 C117 32 135 51 135 80 L130 119 C127 137 115 150 96 150 C77 150 65 137 62 119 Z"
            fill="#08152f"/>
      <path d="M61 78 C61 53 78 38 96 38 C114 38 131 53 131 78 L127 116 C124 132 113 142 96 142 C79 142 68 132 65 116 Z"
            fill="url(#blueMetal)" stroke="#60a5fa" stroke-width="1.4"/>
      <path d="M70 74 L58 87 L61 121 L74 111 Z" fill="#123d9c" stroke="#60a5fa" stroke-width="1"/>
      <path d="M122 74 L134 87 L131 121 L118 111 Z" fill="#123d9c" stroke="#60a5fa" stroke-width="1"/>
      <path d="M76 45 L64 78 L82 74 L96 64 L110 74 L128 78 L116 45 C109 39 83 39 76 45 Z"
            fill="#1455d9" stroke="#93c5fd" stroke-width="1"/>
      <path d="M81 33 H111 L117 70 L96 86 L75 70 Z" fill="#0d3a9c" stroke="#93c5fd" stroke-width="1"/>
      <path d="M86 37 H106 L110 66 L96 77 L82 66 Z" fill="#1e40af" opacity=".88"/>
      <path d="M90 41 H102 V69 H90 Z" fill="#cbd5e1" stroke="#374151" stroke-width="1.2"/>
      <path d="M90 49 H102 M90 57 H102 M90 65 H102" stroke="#6b7280" stroke-width="1"/>

      <!-- ear modules -->
      <circle cx="57" cy="93" r="11" fill="#6b7280" stroke="#d1d5db" stroke-width="1.2"/>
      <circle cx="135" cy="93" r="11" fill="#6b7280" stroke="#d1d5db" stroke-width="1.2"/>
      <path d="M51 84 V103 M141 84 V103" stroke="#111827" stroke-width="4" opacity=".65"/>
      <rect x="55" y="91" width="5" height="18" rx="2" fill="#111827" opacity=".55"/>
      <rect x="132" y="91" width="5" height="18" rx="2" fill="#111827" opacity=".55"/>

      <!-- faceplate -->
      <path d="M70 91 L83 85 H109 L122 91 L116 112 L107 136 H85 L76 112 Z"
            fill="url(#silver)" stroke="#e5e7eb" stroke-width="1.3"/>
      <path d="M96 86 V136" stroke="#f8fafc" stroke-width="1" opacity=".28"/>
      <path d="M75 95 L88 98 L84 109 L76 110 Z" fill="#6b7280" opacity=".65"/>
      <path d="M117 95 L104 98 L108 109 L116 110 Z" fill="#6b7280" opacity=".65"/>
      
      <path d="M76 110 L96 137 L116 110 L108 134 H84 Z" fill="#374151" stroke="#d1d5db" stroke-width="2"/>
      <path d="M83 121 H109" stroke="#ef4444" stroke-width="3" stroke-linecap="round">
        <animate attributeName="opacity" values=".25;1;.25" dur=".55s" repeatCount="indefinite"/>
      </path>

      <!-- eyes and brows -->
      <path d="M63 81 L92 88" stroke="#001a33" stroke-width="5" stroke-linecap="round"/><path d="M129 81 L100 88" stroke="#001a33" stroke-width="5" stroke-linecap="round"/>
      <path d="M67 87 L92 92 L88 100 L65 96 Z" fill="#ff4f4f" filter="url(#glow)">
        <animate attributeName="opacity" values=".45;1;.45" dur=".55s" repeatCount="indefinite"/>
      </path>
      <path d="M125 87 L100 92 L104 100 L127 96 Z" fill="#ff4f4f" filter="url(#glow)">
        <animate attributeName="opacity" values=".45;1;.45" dur=".55s" repeatCount="indefinite"/>
      </path>

      <!-- armor panel lines -->
      <g stroke="#020617" stroke-width="1.2" opacity=".45" fill="none">
        <path d="M63 81 L78 74 L96 66 L114 74 L129 81"/>
        <path d="M65 115 L76 108"/>
        <path d="M127 115 L116 108"/>
        <path d="M75 48 L82 66"/>
        <path d="M117 48 L110 66"/>
      </g>
      <g stroke="#bfdbfe" stroke-width=".75" opacity=".42" fill="none">
        <path d="M62 77 C71 52 79 42 96 42"/>
        <path d="M130 77 C121 52 113 42 96 42"/>
      </g>
    </g>
  </g>
</svg>
